server:
  port: 8000

eureka:
  instance:
    instance-id: ${spring.cloud.client.ip-address}:${server.port}/${spring.application.name}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      #设置与eureka server交互的地址和注册服务都需要依赖这个地址
      defaultZone: http://127.0.0.1:8170/eureka

spring:
  application:
    name: feign-client

#配置feign请求的log
logging:
  level:
    com.csii.service.ExternalApiClient: debug

#配置feign请求的log级别，有full，basic等
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: full

